<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/icons/c21.png">
    <link rel="manifest" href="../manifest.json">
    <link rel="apple-touch-icon" href="../assets/icons/c21.png">
    <title>Inventario | Sweethome Compass Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="custom-bg min-h-screen text-slate-100 font-sans antialiased p-6">

    <main class="max-w-6xl mx-auto animate-fade-in">
        <div class="luxury-card !m-0 !max-w-none">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2">
                    <i data-lucide="home" class="text-[--gold-primary] w-5 h-5"></i>
                    <h2 class="text-lg font-bold text-slate-900">Catálogo de Propiedades</h2>
                </div>
                <button onclick="cargarInventarioCompleto()" class="text-slate-400 hover:text-slate-600 transition-colors cursor-pointer">
                    <i data-lucide="rotate-cw" class="w-4 h-4"></i>
                </button>
            </div>
            <div class="bg-slate-50 border border-slate-100 p-4 rounded-2xl mb-6 grid grid-cols-1 md:grid-cols-3 gap-3">
                <div class="flex flex-col gap-1.5">
                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Tipo de Propiedad</label>
                    <select id="filtroTipo" onchange="aplicarFiltrosInventario()" class="luxury-input w-full px-3 py-2 text-xs">
                        <option value="">Todos los tipos</option>
                        <option value="Casa">Casa</option>
                        <option value="Departamento">Departamento</option>
                        <option value="Terreno">Terreno</option>
                        <option value="Bodega">Bodega</option>
                        <option value="Locales">Locales</option>
                        <option value="Rentas">Rentas</option>
                    </select>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Zona o Colonia</label>
                    <div class="relative">
                        <i data-lucide="map-pin" class="absolute left-3 top-2.5 w-3.5 h-3.5 text-slate-400"></i>
                        <input type="text" id="filtroZona" oninput="aplicarFiltrosInventario()" placeholder="Ej. Juriquilla..." class="luxury-input w-full pl-8 pr-3 py-2 text-xs">
                    </div>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Precio Máximo</label>
                    <div class="relative">
                        <i data-lucide="dollar-sign" class="absolute left-3 top-2.5 w-3.5 h-3.5 text-slate-400"></i>
                        <select id="filtroPrecio" onchange="aplicarFiltrosInventario()" class="luxury-input w-full pl-8 pr-3 py-2 text-xs">
                            <option value="">Cualquier precio</option>
                            <option value="2000000">Hasta $2,000,000</option>
                            <option value="3000000">Hasta $3,000,000</option>
                            <option value="4000000">Hasta $4,000,000</option>
                            <option value="6000000">Hasta $6,000,000</option>
                            <option value="10000000">Hasta $10,000,000</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="gridInventario" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 text-slate-700">
                <p class="text-slate-400 text-xs italic col-span-3 text-center">Cargando inventario desde la base de datos...</p>
            </div>
        </div>
    </main>

    <script src="navbar.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="admin.js"></script>
    <script>renderLuxuryNavbar('inventario');</script>
    <script>cargarInventarioCompleto();</script>
</body>
</html>
