<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro | Consola Corporativa</title>
    <link rel="icon" type="image/png" href="../assets/icons/c21.png">
    <link rel="manifest" href="../manifest.json">
    <link rel="apple-touch-icon" href="../assets/icons/c21.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/global.css">
    <script src="../assets/js/api.js"></script>
</head>
<body class="bg-slate-50 font-['Inter'] min-h-screen flex items-center justify-center p-4">

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-[100] flex flex-col gap-3"></div>

    <div class="bg-white rounded-[2rem] shadow-2xl p-8 md:p-12 w-full max-w-md border border-slate-100">
        
        <!-- Logo / Header -->
        <div class="text-center mb-10">
            <div class="w-16 h-16 rounded-2xl bg-slate-50 border border-amber-500/30 flex items-center justify-center text-[--gold-primary] shadow-sm mx-auto mb-4">
                <i data-lucide="shield-check" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-slate-900">Consola Corporativa</h1>
            <p class="text-sm font-semibold tracking-widest text-[--gold-primary] uppercase mt-1">Century 21</p>
        </div>

        <!-- Formulario -->
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Usuario o Correo</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="user" class="h-5 w-5 text-slate-400"></i>
                    </div>
                    <input type="text" id="username" required class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl bg-slate-50 text-slate-900 focus:outline-none focus:ring-2 focus:ring-[--gold-primary] focus:border-transparent transition-all" placeholder="">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Contraseña</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="lock" class="h-5 w-5 text-slate-400"></i>
                    </div>
                    <input type="password" id="password" required class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl bg-slate-50 text-slate-900 focus:outline-none focus:ring-2 focus:ring-[--gold-primary] focus:border-transparent transition-all" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" id="btnLogin" class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-xl shadow-md text-sm font-bold text-black bg-[--gold-primary] hover:bg-yellow-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[--gold-primary] transition-all transform active:scale-[0.98]">
                Iniciar Sesión <i data-lucide="arrow-right" class="ml-2 w-4 h-4"></i>
            </button>
        </form>

        <div class="mt-8 text-center text-xs text-slate-400">
            <p>Acceso restringido para personal autorizado.</p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function mostrarNotificacion(mensaje, tipo = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl transform translate-y-10 opacity-0 transition-all duration-300 ${
                tipo === 'success' ? 'bg-white border-l-4 border-emerald-500' :
                tipo === 'error' ? 'bg-white border-l-4 border-rose-500' :
                'bg-white border-l-4 border-[--gold-primary]'
            }`;
            
            const icon = tipo === 'success' ? '<i data-lucide="check-circle" class="text-emerald-500 w-5 h-5"></i>' :
                         tipo === 'error' ? '<i data-lucide="alert-circle" class="text-rose-500 w-5 h-5"></i>' :
                         '<i data-lucide="info" class="text-[--gold-primary] w-5 h-5"></i>';

            toast.innerHTML = `${icon} <p class="text-sm font-bold text-slate-800">${mensaje}</p>`;
            container.appendChild(toast);
            lucide.createIcons();

            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
                toast.classList.add('translate-y-0', 'opacity-100');
            });

            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            btn.innerHTML = `<i data-lucide="loader" class="w-5 h-5 animate-spin"></i>`;
            lucide.createIcons();
            btn.disabled = true;

            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            try {
                const res = await fetch(`${window.API_BASE_URL}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario_o_correo: u, password: p })
                });
                
                const data = await res.json();
                
                if (data.status === 'success') {
                    localStorage.setItem('adminToken', data.token);
                    mostrarNotificacion('¡Bienvenido!', 'success');
                    setTimeout(() => {
                        window.location.href = 'clientes.html';
                    }, 1000);
                } else {
                    mostrarNotificacion(data.message, 'error');
                    btn.disabled = false;
                    btn.innerHTML = `Iniciar Sesión <i data-lucide="arrow-right" class="ml-2 w-4 h-4"></i>`;
                    lucide.createIcons();
                }
            } catch (err) {
                mostrarNotificacion('Error de conexión', 'error');
                btn.disabled = false;
                btn.innerHTML = `Iniciar Sesión <i data-lucide="arrow-right" class="ml-2 w-4 h-4"></i>`;
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
