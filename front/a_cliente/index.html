<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/icons/c21.png">
    <title>Century 21</title>
    
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/609/609034.png">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../assets/css/global.css">
</head>
<body>

    <div class="luxury-frame">
        
        <div class="luxury-card">
            
            <div id="wrapperProgress" class="mb-6 hidden animate-fade-in">
                <div class="flex justify-between items-center mb-2 px-1">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest" id="progressText">Paso 1</span>
                    <span class="text-[10px] font-bold text-[var(--gold-dark)]" id="progressPercent">0%</span>
                </div>
                <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                    <div id="progressBar" class="bg-gradient-to-r from-[var(--gold-primary)] to-[var(--gold-dark)] h-full rounded-full transition-all duration-700 ease-out relative" style="width: 0%">
                        <div class="absolute inset-0 bg-white/20 animate-pulse"></div>
                    </div>
                </div>
            </div>

            <form id="perfilamientoForm" class="space-y-6">
                
                <div id="contenedorPregunta" class="animate-fade-in"></div>

                <div id="wrapperButtons" class="flex justify-between items-center pt-4 border-t border-slate-100 hidden">
                    <button type="button" id="btnBack" class="text-slate-400 hover:text-slate-600 font-medium px-4 py-2 rounded-xl transition-all flex items-center gap-2 cursor-pointer invisible">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i> Atrás
                    </button>
                    
                    <button type="button" id="btnNext" class="luxury-btn px-6 py-3 text-sm flex items-center gap-2 cursor-pointer">
                        Continuar <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                </div>
                
            </form>
        </div>

    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../sw.js')
                    .then(reg => console.log('PWA Lista.'))
                    .catch(err => console.log('Error SW:', err));
            });
        }
    </script>

    <script src="../assets/js/api.js"></script>
    <script src="cliente.js"></script>
</body>
</html>
