<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/icons/c21.png">
    <link rel="manifest" href="../manifest.json">
    <link rel="apple-touch-icon" href="../assets/icons/c21-icon-512.png">
    <title>Agenda | Century 21</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../assets/css/admin.css">
    <script src="navbar.js"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 p-4 font-sans antialiased">

    <!-- Inicializar Navbar -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            renderLuxuryNavbar('calendario');
        });
    </script>

    <main class="max-w-6xl mx-auto grid grid-cols-1 gap-6 animate-fade-in pb-20">
        
        <!-- Header / Título -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-2">
            <div>
                <h2 class="text-2xl font-black text-slate-900 tracking-tight flex items-center gap-2">
                    <i data-lucide="calendar-days" class="w-6 h-6 text-[--gold-primary]"></i>
                    Mi Agenda Inteligente
                </h2>
                <p class="text-sm text-slate-500 font-medium mt-1">
                    Sincronización en tiempo real con Google Calendar
                </p>
            </div>
            
            <div class="flex items-center gap-3">
                <div class="relative hidden" id="contenedorFiltro">
                    <input type="date" id="filtroFecha" onchange="aplicarFiltroFecha()" class="border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:ring-2 focus:ring-[--gold-primary] outline-none text-slate-600 bg-white shadow-sm cursor-pointer" title="Filtrar por fecha">
                    <button onclick="document.getElementById('filtroFecha').value=''; aplicarFiltroFecha()" class="absolute -right-8 top-2.5 text-slate-400 hover:text-rose-500 cursor-pointer" title="Limpiar filtro"><i data-lucide="x-circle" class="w-5 h-5"></i></button>
                </div>
                
                <button id="btnAuthGoogle" onclick="loginGoogle()" class="luxury-btn px-5 py-2.5 text-sm flex items-center gap-2 cursor-pointer shadow-xl hidden">
                    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" class="w-4 h-4" alt="Google">
                    Vincular con Google
                </button>

                <button id="btnNuevaCita" onclick="abrirModalCita()" class="bg-slate-900 hover:bg-black text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 cursor-pointer shadow-lg hidden ml-8">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    Nueva Cita
                </button>
            </div>
        </div>

        <!-- Contenedor de Citas -->
        <div class="bg-white border border-slate-100 rounded-3xl p-6 shadow-sm min-h-[400px]">
            
            <div id="loadingCitas" class="flex flex-col items-center justify-center h-64 text-slate-400">
                <i data-lucide="loader-2" class="w-8 h-8 animate-spin mb-4 text-[--gold-primary]"></i>
                <p class="font-medium text-sm">Sincronizando agenda...</p>
            </div>

            <div id="gridCitas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 hidden">
                <!-- Las citas se insertarán aquí por JS -->
            </div>

            <div id="noAuthMessage" class="hidden flex flex-col items-center justify-center h-64 text-center">
                <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mb-4 border border-slate-100 shadow-inner">
                    <i data-lucide="calendar-off" class="w-8 h-8 text-slate-300"></i>
                </div>
                <h3 class="text-slate-900 font-bold text-lg mb-2">Permisos Actualizados</h3>
                <p class="text-slate-500 text-sm max-w-sm mx-auto mb-6">Hemos habilitado la función para crear citas directamente desde tu CRM. Por favor, vuelve a iniciar sesión con Google para aplicar los nuevos permisos.</p>
                <button onclick="loginGoogle()" class="luxury-btn px-6 py-2.5 text-sm flex items-center gap-2 cursor-pointer shadow-lg">
                    Re-conectar Google Calendar
                </button>
            </div>

        </div>

    </main>

    <!-- Modal Nueva Cita -->
    <div id="modalNuevaCita" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-md shadow-2xl p-6 border border-slate-100 transform scale-95 transition-all">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-xl font-black text-slate-900" id="tituloModalCita">Programar Cita</h3>
                <button onclick="cerrarModalCita()" class="text-slate-400 hover:text-slate-700 bg-slate-100 hover:bg-slate-200 p-2 rounded-full transition-colors cursor-pointer">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>

            <form id="formNuevaCita" class="space-y-4">
                <input type="hidden" id="citaId">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">TÃTULO O ASUNTO</label>
                    <input type="text" id="citaTitulo" required class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-[--gold-primary] focus:border-transparent outline-none bg-slate-50 focus:bg-white transition-all" placeholder="Ej. Firma de Contrato">
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">FECHA</label>
                    <input type="date" id="citaFecha" required class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-[--gold-primary] focus:border-transparent outline-none bg-slate-50 focus:bg-white transition-all">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">HORA INICIO</label>
                        <input type="time" id="citaHoraInicio" required class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-[--gold-primary] focus:border-transparent outline-none bg-slate-50 focus:bg-white transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">HORA FIN</label>
                        <input type="time" id="citaHoraFin" required class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-[--gold-primary] focus:border-transparent outline-none bg-slate-50 focus:bg-white transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">UBICACIÓN (OPCIONAL)</label>
                    <input type="text" id="citaUbicacion" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-[--gold-primary] focus:border-transparent outline-none bg-slate-50 focus:bg-white transition-all" placeholder="Dirección de la propiedad o enlace de Zoom">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">NOTAS</label>
                    <textarea id="citaNotas" rows="2" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-[--gold-primary] focus:border-transparent outline-none bg-slate-50 focus:bg-white transition-all resize-none" placeholder="Llevar documentos originales..."></textarea>
                </div>

                <div class="pt-2">
                    <button type="submit" id="btnGuardarCita" class="w-full luxury-btn py-3 rounded-xl font-bold text-sm cursor-pointer flex justify-center items-center gap-2">
                        Guardar en Google Calendar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts Base -->
    <script src="admin.js"></script>
    
    <!-- Script de Calendario -->
    <script>
        window.API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
        ? 'http://localhost:3000/api' : '/api';
        
        window.citasGlobal = [];

        async function cargarCalendario() {
            const grid = document.getElementById('gridCitas');
            const loader = document.getElementById('loadingCitas');
            const noAuth = document.getElementById('noAuthMessage');
            const btnAuth = document.getElementById('btnAuthGoogle');
            const btnNueva = document.getElementById('btnNuevaCita');
            const contenedorFiltro = document.getElementById('contenedorFiltro');

            try {
                const response = await fetch(`${window.API_BASE_URL}/admin/calendario`);
                const res = await response.json();

                loader.classList.add('hidden');

                if (res.status === 'unauthorized') {
                    noAuth.classList.remove('hidden');
                    btnAuth.classList.remove('hidden');
                    btnNueva.classList.add('hidden');
                    contenedorFiltro.classList.add('hidden');
                    return;
                }

                if (res.status === 'success') {
                    grid.classList.remove('hidden');
                    btnNueva.classList.remove('hidden');
                    contenedorFiltro.classList.remove('hidden');
                    
                    window.citasGlobal = res.data;
                    aplicarFiltroFecha();
                }

            } catch (error) {
                console.error(error);
                loader.innerHTML = `<p class="text-rose-500">Error al conectar con el servidor.</p>`;
            }
        }

        function aplicarFiltroFecha() {
            const grid = document.getElementById('gridCitas');
            const filtro = document.getElementById('filtroFecha').value;
            
            let citasFiltradas = window.citasGlobal;

            if (filtro) {
                // El filtro viene en formato YYYY-MM-DD
                citasFiltradas = window.citasGlobal.filter(evento => {
                    const inicio = new Date(evento.start.dateTime || evento.start.date);
                    // Ajuste de zona horaria para comparar correctamente
                    const fechaEvento = inicio.toISOString().split('T')[0];
                    return fechaEvento === filtro;
                });
            }

            if (citasFiltradas.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center text-slate-400 py-10">No hay citas programadas${filtro ? ' para este día' : ''}.</p>`;
                return;
            }

            grid.innerHTML = citasFiltradas.map(evento => {
                const inicio = new Date(evento.start.dateTime || evento.start.date);
                const fin = new Date(evento.end.dateTime || evento.end.date);
                
                const horaInicio = inicio.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
                const horaFin = fin.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
                
                const esHoy = new Date().toDateString() === inicio.toDateString();
                const tagHoy = esHoy ? `<span class="bg-rose-50 text-rose-500 text-[9px] px-2 py-0.5 rounded font-black uppercase tracking-wider border border-rose-100">Hoy</span>` : '';

                // Serializar datos para el botón de editar
                const datosCita = encodeURIComponent(JSON.stringify({
                    id: evento.id,
                    titulo: evento.summary,
                    fecha: inicio.toISOString().split('T')[0],
                    horaInicio: horaInicio,
                    horaFin: horaFin,
                    ubicacion: evento.location || '',
                    notas: evento.description || ''
                }));

                return `
                <div class="bg-slate-50 border border-slate-100 rounded-2xl p-4 hover:border-amber-500/30 transition-all hover:shadow-md group relative">
                    <div class="absolute top-3 right-3 flex gap-2 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity bg-white p-1 rounded-lg shadow-sm border border-slate-100">
                        <button onclick="abrirModalCita('${datosCita}')" class="text-slate-400 hover:text-[--gold-primary] p-1.5 transition-colors cursor-pointer" title="Editar Cita">
                            <i data-lucide="edit-2" class="w-4 h-4"></i>
                        </button>
                        <button onclick="eliminarCita('${evento.id}')" class="text-slate-400 hover:text-rose-500 p-1.5 transition-colors cursor-pointer" title="Borrar Cita">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                    
                    <div class="flex items-center gap-2 mb-3 pr-16">
                        <div class="w-10 h-10 rounded-xl bg-white shadow-sm border border-slate-100 flex flex-col items-center justify-center text-[--gold-primary] shrink-0">
                            <span class="text-[9px] font-black uppercase leading-none">${inicio.toLocaleDateString('es-MX', { month: 'short' })}</span>
                            <span class="text-sm font-black leading-tight">${inicio.getDate()}</span>
                        </div>
                        <div>
                            <h3 class="font-bold text-slate-900 text-sm line-clamp-1">${evento.summary || 'Cita sin título'}</h3>
                            <div class="flex items-center gap-2">
                                <p class="text-[10px] text-slate-500 font-medium"><i data-lucide="clock" class="inline w-3 h-3 mr-0.5 mb-0.5"></i> ${horaInicio} - ${horaFin}</p>
                                ${tagHoy}
                            </div>
                        </div>
                    </div>

                    ${evento.description ? `<p class="text-[11px] text-slate-500 line-clamp-2 mt-2 leading-relaxed bg-white p-2 rounded-lg border border-slate-100">${evento.description}</p>` : ''}
                    
                    ${evento.location ? `
                    <div class="mt-3 pt-3 border-t border-slate-100 flex items-start gap-1">
                        <i data-lucide="map-pin" class="w-3.5 h-3.5 text-slate-400 mt-0.5 flex-shrink-0"></i>
                        <span class="text-[10px] text-slate-600 font-medium line-clamp-1">${evento.location}</span>
                    </div>` : ''}
                </div>
                `;
            }).join('');
            
            lucide.createIcons();
        }

        async function loginGoogle() {
            try {
                const response = await fetch(`${window.API_BASE_URL}/auth/google/url`);
                const res = await response.json();
                if (res.status === 'success') {
                    window.open(res.url, 'Google Auth', 'width=500,height=600');
                    mostrarNotificacion("Completa el inicio de sesión en la ventana emergente.", "info");
                    
                    const checkAuth = setInterval(async () => {
                        const checkRes = await fetch(`${window.API_BASE_URL}/admin/calendario`);
                        const checkData = await checkRes.json();
                        if (checkData.status !== 'unauthorized') {
                            clearInterval(checkAuth);
                            mostrarNotificacion("¡Autenticación exitosa!", "success");
                            location.reload();
                        }
                    }, 2000);
                }
            } catch (e) {
                mostrarNotificacion("Error al generar link de Google.", "error");
            }
        }

        // Modal Logic
        function abrirModalCita(datosStr = null) {
            const now = new Date();
            const inputFecha = document.getElementById('citaFecha');
            const todayStr = now.toISOString().split('T')[0];
            
            // Establecer el mínimo a hoy
            inputFecha.setAttribute('min', todayStr);

            if (datosStr) {
                const datos = JSON.parse(decodeURIComponent(datosStr));
                document.getElementById('tituloModalCita').innerText = "Editar Cita";
                document.getElementById('citaId').value = datos.id;
                document.getElementById('citaTitulo').value = datos.titulo;
                document.getElementById('citaFecha').value = datos.fecha;
                document.getElementById('citaHoraInicio').value = convertirHora24(datos.horaInicio);
                document.getElementById('citaHoraFin').value = convertirHora24(datos.horaFin);
                document.getElementById('citaUbicacion').value = datos.ubicacion;
                document.getElementById('citaNotas').value = datos.notas;
                document.getElementById('btnGuardarCita').innerHTML = "Actualizar Cita";
            } else {
                document.getElementById('formNuevaCita').reset();
                document.getElementById('tituloModalCita').innerText = "Programar Cita";
                document.getElementById('citaId').value = "";
                inputFecha.value = todayStr;
                document.getElementById('btnGuardarCita').innerHTML = "Guardar en Google Calendar";
            }
            
            document.getElementById('modalNuevaCita').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('modalNuevaCita').children[0].classList.remove('scale-95');
            }, 10);
        }

        function convertirHora24(hora12) {
            // Convierte "02:30 PM" a "14:30" para los inputs type="time"
            if(!hora12) return "";
            const [time, modifier] = hora12.split(' ');
            let [hours, minutes] = time.split(':');
            if (hours === '12') hours = '00';
            if (modifier === 'PM' || modifier === 'p.m.') hours = parseInt(hours, 10) + 12;
            return `${hours.toString().padStart(2, '0')}:${minutes}`;
        }

        function cerrarModalCita() {
            document.getElementById('modalNuevaCita').children[0].classList.add('scale-95');
            setTimeout(() => {
                document.getElementById('modalNuevaCita').classList.add('hidden');
                document.getElementById('formNuevaCita').reset();
            }, 200);
        }

        document.getElementById('formNuevaCita').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnGuardarCita');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Guardando...';
            btn.disabled = true;

            const id = document.getElementById('citaId').value;
            const titulo = document.getElementById('citaTitulo').value;
            const fecha = document.getElementById('citaFecha').value;
            const horaInicio = document.getElementById('citaHoraInicio').value;
            const horaFin = document.getElementById('citaHoraFin').value;
            const ubicacion = document.getElementById('citaUbicacion').value;
            const notas = document.getElementById('citaNotas').value;

            const startDateTime = `${fecha}T${horaInicio}:00-06:00`;
            const endDateTime = `${fecha}T${horaFin}:00-06:00`;

            const url = id ? `${window.API_BASE_URL}/admin/calendario/${id}` : `${window.API_BASE_URL}/admin/calendario`;
            const method = id ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        summary: titulo,
                        startDateTime: startDateTime,
                        endDateTime: endDateTime,
                        location: ubicacion,
                        description: notas
                    })
                });
                
                const res = await response.json();
                
                if (res.status === 'success') {
                    cerrarModalCita();
                    mostrarNotificacion(`¡Cita ${id ? 'actualizada' : 'creada'} con éxito!`, 'success');
                    cargarCalendario();
                } else {
                    mostrarNotificacion(res.message || 'Error al guardar la cita', 'error');
                }
            } catch (error) {
                mostrarNotificacion('Error de conexión', 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                lucide.createIcons();
            }
        });

        async function eliminarCita(id) {
            if (!confirm("¿Estás seguro de que deseas eliminar esta cita? Esto la borrará también de tu Google Calendar.")) return;
            
            try {
                const response = await fetch(`${window.API_BASE_URL}/admin/calendario/${id}`, { method: 'DELETE' });
                const res = await response.json();
                
                if (res.status === 'success') {
                    mostrarNotificacion('Cita eliminada correctamente', 'info');
                    cargarCalendario();
                } else {
                    mostrarNotificacion(res.message || 'Error al eliminar', 'error');
                }
            } catch (e) {
                mostrarNotificacion('Error de conexión', 'error');
            }
        }

        // Iniciar
        document.addEventListener('DOMContentLoaded', cargarCalendario);

    </script>
</body>
</html>
